services:
  - type: web
    name: task-manager-api
    env: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build -w apps/api
    startCommand: npm start -w apps/api
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        fromDatabase:
          name: task-manager-db
          property: jwt_secret
      - key: SENDGRID_API_KEY
        scope: build
      - key: EMAIL_FROM
        scope: build
      - key: CORS_ORIGIN
        scope: build
      - key: PORT
        value: "10000"

databases:
  - name: task-manager-db
    databaseName: task_manager
    user: task_manager_user
    region: oregon
    plan: free
